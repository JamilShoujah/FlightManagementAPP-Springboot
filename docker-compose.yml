services:
  db:
    image: postgres:16-alpine
    container_name: flight-food-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flightsdb}
      POSTGRES_USER: ${POSTGRES_USER:-flight_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flight_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flight_user} -d ${POSTGRES_DB:-flightsdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: flight-food-service:local
    container_name: flight-food-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-flightsdb}
      DB_USER: ${POSTGRES_USER:-flight_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-flight_password}
    ports:
      - "${SERVER_PORT:-8080}:8080"

volumes:
  postgres_data:
