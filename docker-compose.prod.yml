services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: flight-food-service:prod
    container_name: flight-food-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-4}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE:-0}
      DB_CONN_TIMEOUT_MS: ${DB_CONN_TIMEOUT_MS:-10000}
      DB_VALIDATION_TIMEOUT_MS: ${DB_VALIDATION_TIMEOUT_MS:-5000}
      DB_IDLE_TIMEOUT_MS: ${DB_IDLE_TIMEOUT_MS:-180000}
      DB_MAX_LIFETIME_MS: ${DB_MAX_LIFETIME_MS:-600000}
      DB_KEEPALIVE_TIME_MS: ${DB_KEEPALIVE_TIME_MS:-120000}
      TOMCAT_MAX_THREADS: ${TOMCAT_MAX_THREADS:-30}
      TOMCAT_MIN_SPARE_THREADS: ${TOMCAT_MIN_SPARE_THREADS:-5}
      TOMCAT_ACCEPT_COUNT: ${TOMCAT_ACCEPT_COUNT:-100}
      TOMCAT_CONNECTION_TIMEOUT: ${TOMCAT_CONNECTION_TIMEOUT:-10s}
      SERVER_PORT: ${SERVER_PORT:-8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}
      TNS_ADMIN: ${WALLET_CONTAINER_PATH:-/app/wallet}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:-} -Doracle.net.tns_admin=${WALLET_CONTAINER_PATH:-/app/wallet}
    volumes:
      - ${WALLET_DIR:-./Wallet_WSAIDBATP}:${WALLET_CONTAINER_PATH:-/app/wallet}:ro
    ports:
      - "${SERVER_PORT:-8080}:8080"
