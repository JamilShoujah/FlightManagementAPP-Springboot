services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: flight-food-service:prod
    container_name: flight-food-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SERVER_PORT: ${SERVER_PORT:-8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}
      TNS_ADMIN: ${WALLET_CONTAINER_PATH:-/app/wallet}
      JAVA_TOOL_OPTIONS: -Doracle.net.tns_admin=${WALLET_CONTAINER_PATH:-/app/wallet}
    volumes:
      - ${WALLET_DIR:-./Wallet_TUC50B42BDEI3XAY}:${WALLET_CONTAINER_PATH:-/app/wallet}:ro
    ports:
      - "${SERVER_PORT:-8080}:8080"
